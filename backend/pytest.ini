[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
addopts =
    --cov=app
    --cov-fail-under=80
    --cov-report=term-missing
    --cov-report=html
    -v
